<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="380" viewBox="0 0 1200 380"
     role="img" aria-labelledby="title desc">
  <title id="title">IT 运维管理平台</title>
  <desc id="desc">企业级 IT 运维管理平台，涵盖资产管理、安全合规、权限治理、日程协作，支持 LDAP 统一认证与双控审批机制。</desc>

  <defs>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b26"/>
      <stop offset="100%" stop-color="#12161f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" rx="24" fill="#0b0e14"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="76" x2="1200" y2="76"/>
    <line x1="0" y1="152" x2="1200" y2="152"/>
    <line x1="0" y1="228" x2="1200" y2="228"/>
    <line x1="0" y1="304" x2="1200" y2="304"/>
    <line x1="200" y1="0" x2="200" y2="380"/>
    <line x1="400" y1="0" x2="400" y2="380"/>
    <line x1="600" y1="0" x2="600" y2="380"/>
    <line x1="800" y1="0" x2="800" y2="380"/>
    <line x1="1000" y1="0" x2="1000" y2="380"/>
  </g>

  <!-- Left: Title block -->
  <g id="title-block" transform="translate(64 72)">
    <!-- Category -->
    <rect x="0" y="0" width="132" height="28" rx="6" fill="url(#accent-grad)" opacity="0.15"/>
    <text x="12" y="19" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="13" font-weight="500" fill="#60a5fa" letter-spacing="1">ENTERPRISE</text>

    <!-- Project name -->
    <text x="0" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="44" font-weight="700" fill="#f1f5f9">IT 运维管理平台</text>

    <!-- Description -->
    <text x="0" y="112" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="18" fill="#94a3b8">资产管理 · 安全合规 · 权限治理 · 日程协作</text>

    <!-- Tech badges -->
    <g transform="translate(0 148)">
      <rect x="0" y="0" width="72" height="26" rx="6" fill="#1e293b"/>
      <text x="12" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">Go 1.25</text>

      <rect x="82" y="0" width="72" height="26" rx="6" fill="#1e293b"/>
      <text x="94" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">Vue 2.7</text>

      <rect x="164" y="0" width="56" height="26" rx="6" fill="#1e293b"/>
      <text x="176" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">Gin</text>

      <rect x="230" y="0" width="92" height="26" rx="6" fill="#1e293b"/>
      <text x="242" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">Element UI</text>

      <rect x="332" y="0" width="64" height="26" rx="6" fill="#1e293b"/>
      <text x="344" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">MySQL</text>
    </g>

    <!-- Security indicators -->
    <g transform="translate(0 200)">
      <circle cx="6" cy="8" r="4" fill="#22c55e"/>
      <text x="18" y="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">LDAP 认证</text>

      <circle cx="116" cy="8" r="4" fill="#22c55e"/>
      <text x="128" y="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">双控审批</text>

      <circle cx="226" cy="8" r="4" fill="#22c55e"/>
      <text x="238" y="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">RSA/AES 加密</text>

      <circle cx="366" cy="8" r="4" fill="#22c55e"/>
      <text x="378" y="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#64748b">HTTPS</text>
    </g>
  </g>

  <!-- Right: Module architecture -->
  <g id="module-map" transform="translate(680 48)">
    <!-- Central node -->
    <rect x="168" y="128" width="120" height="40" rx="10" fill="url(#accent-grad)"/>
    <text x="228" y="153" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">核心平台</text>

    <!-- Connection lines -->
    <g stroke="#334155" stroke-width="1.5" fill="none" opacity="0.6">
      <path d="M228 128 L228 82 L120 82 L120 62"/>
      <path d="M228 128 L228 82 L340 82 L340 62"/>
      <path d="M168 148 L80 148 L80 130"/>
      <path d="M288 148 L380 148 L380 130"/>
      <path d="M228 168 L228 218 L120 218 L120 236"/>
      <path d="M228 168 L228 218 L340 218 L340 236"/>
    </g>

    <!-- Module cards - top row -->
    <g transform="translate(48 20)">
      <rect x="0" y="0" width="144" height="42" rx="8" fill="url(#card-grad)" stroke="#1e293b" stroke-width="1"/>
      <circle cx="20" cy="21" r="5" fill="#f59e0b"/>
      <text x="34" y="26" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">资产管理</text>
    </g>

    <g transform="translate(268 20)">
      <rect x="0" y="0" width="144" height="42" rx="8" fill="url(#card-grad)" stroke="#1e293b" stroke-width="1"/>
      <circle cx="20" cy="21" r="5" fill="#ef4444"/>
      <text x="34" y="26" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">安全合规</text>
    </g>

    <!-- Module cards - middle row -->
    <g transform="translate(8 108)">
      <rect x="0" y="0" width="144" height="42" rx="8" fill="url(#card-grad)" stroke="#1e293b" stroke-width="1"/>
      <circle cx="20" cy="21" r="5" fill="#8b5cf6"/>
      <text x="34" y="26" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">权限治理</text>
    </g>

    <g transform="translate(308 108)">
      <rect x="0" y="0" width="144" height="42" rx="8" fill="url(#card-grad)" stroke="#1e293b" stroke-width="1"/>
      <circle cx="20" cy="21" r="5" fill="#06b6d4"/>
      <text x="34" y="26" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">变更管理</text>
    </g>

    <!-- Module cards - bottom row -->
    <g transform="translate(48 236)">
      <rect x="0" y="0" width="144" height="42" rx="8" fill="url(#card-grad)" stroke="#1e293b" stroke-width="1"/>
      <circle cx="20" cy="21" r="5" fill="#22c55e"/>
      <text x="34" y="26" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">日程协作</text>
    </g>

    <g transform="translate(268 236)">
      <rect x="0" y="0" width="144" height="42" rx="8" fill="url(#card-grad)" stroke="#1e293b" stroke-width="1"/>
      <circle cx="20" cy="21" r="5" fill="#ec4899"/>
      <text x="34" y="26" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="13" fill="#cbd5e1">密码本</text>
    </g>
  </g>
</svg>
